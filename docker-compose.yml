version: '3.9'

services:
  valkey:
    image: valkey/valkey-bundle:9-alpine
    container_name: valkey-commerce-valkey
    ports:
      - '6379:6379'
    volumes:
      - valkey_data:/data
    command: valkey-server --save 60 1 --loglevel warning
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: valkey-commerce-postgres
    environment:
      POSTGRES_DB: valkey_commerce
      POSTGRES_USER: valkey_user
      POSTGRES_PASSWORD: valkey_secret
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U valkey_user -d valkey_commerce']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: valkey-commerce-backend
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: production
      PORT: 4000
      VALKEY_URL: redis://valkey:6379
      DATABASE_URL: postgresql://valkey_user:valkey_secret@postgres:5432/valkey_commerce
      JWT_SECRET: super-secret-jwt-key-change-in-production
      JWT_REFRESH_SECRET: super-secret-refresh-key-change-in-production
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-demo}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      valkey:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: valkey-commerce-frontend
    ports:
      - '3000:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  valkey_data:
  postgres_data:
